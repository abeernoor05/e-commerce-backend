name: CI Build Push and Update Manifests

on:
  push:
    branches: [ "main" ]
    paths:
      - "services/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "services/**"
      - ".github/workflows/ci.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, product-service, order-service]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}

  update-manifests:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update deployment image tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -e
          sed -i "s#image: .*auth-service:.*#image: ${DOCKERHUB_USERNAME}/auth-service:${IMAGE_TAG}#" deploy/k8s/base/auth-service/deployment.yaml
          sed -i "s#image: .*product-service:.*#image: ${DOCKERHUB_USERNAME}/product-service:${IMAGE_TAG}#" deploy/k8s/base/product-service/deployment.yaml
          sed -i "s#image: .*order-service:.*#image: ${DOCKERHUB_USERNAME}/order-service:${IMAGE_TAG}#" deploy/k8s/base/order-service/deployment.yaml

      - name: Commit and push manifest changes
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/base/*/deployment.yaml
          git diff --cached --quiet && exit 0
          git commit -m "ci: update image tags to ${GITHUB_SHA}"
          git push
